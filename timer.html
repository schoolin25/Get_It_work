<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>카운트다운 타이머 과제</title>
  </head>
  <body>
    <h2>카운트다운 타이머</h2>

    <input id="seconds" type="number" placeholder="초 입력" />
    <button id="start">시작</button>
    <button id="pause">일시정지</button>
    <button id="resume">재개</button>
    <button id="reset">초기화</button>

    <p id="display">대기 중</p>

    <script src="timer.js"></script>
  </body>
</html>
